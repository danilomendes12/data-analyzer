version: 2.1

orbs:
  codecov: codecov/codecov@6

jobs:
  build:
    docker:
      - image: cimg/openjdk:17.0
    steps:
      - checkout
      - restore_cache:
          name: Restore Maven cache
          keys:
            - maven-{{ checksum "pom.xml" }}
            - maven-
      - run:
          name: Build
          command: mvn -B -DskipTests compile
      - run:
          name: Testes
          command: mvn -B test
      - store_test_results:
          path: target/surefire-reports
      - run:
          name: Relatório de cobertura (JaCoCo)
          # Goals diretos sobre o jacoco.exec do passo "Testes" — sem recompilar/repackage.
          # A sintaxe @<id> executa cada goal com a configuração da execução homônima do pom
          # (report + regra de 80% do check).
          command: mvn -B jacoco:report@report jacoco:check@check
      - save_cache:
          name: Save Maven cache
          key: maven-{{ checksum "pom.xml" }}
          paths:
            - ~/.m2
      - codecov/upload:
          files: target/site/jacoco/jacoco.xml

workflows:
  build:
    jobs:
      - build
